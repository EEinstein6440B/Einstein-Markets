<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Einstein Markets - AI-powered financial dashboard">
    <meta name="theme-color" content="#0a0e17">
    <title>Einstein Markets v2.0</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/assets/icon-192.png">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #141b28;
            --bg-tertiary: #1e2838;
            --text-primary: #e8eef7;
            --text-secondary: #a0aac0;
            --text-muted: #6b7a94;
            --color-up: #22c55e;
            --color-down: #ef4444;
            --color-accent: #3b82f6;
            --color-warning: #f59e0b;
            --color-danger: #dc2626;
            --color-geo: #dc2626;
            --color-ai: #3b82f6;
            --color-energy: #fbbf24;
            --color-crypto: #f97316;
            --color-fed: #8b5cf6;
            --color-earnings: #22c55e;
            --border-color: #2a3a4f;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
        }

        .header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            flex-shrink: 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-accent), var(--color-ai));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .pulse-strip {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding: 0.75rem 0;
            margin-bottom: 0.5rem;
            scroll-behavior: smooth;
        }

        .pulse-strip::-webkit-scrollbar {
            height: 3px;
        }

        .pulse-strip::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        .pulse-strip::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .pulse-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .pulse-item:hover {
            background-color: var(--bg-primary);
            border-color: var(--color-accent);
            transform: translateY(-2px);
        }

        .pulse-symbol {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .pulse-price {
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .pulse-change {
            font-size: 0.7rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .pulse-change.up {
            color: var(--color-up);
        }

        .pulse-change.down {
            color: var(--color-down);
        }

        .market-mood {
            padding: 0.75rem 1rem;
            background: linear-gradient(90deg, rgba(59,130,246,0.1), rgba(59,130,246,0.05));
            border-left: 3px solid var(--color-accent);
            border-radius: 4px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .mood-text {
            font-style: italic;
        }

        .nav-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-primary);
        }

        .nav-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition);
            border-bottom: 2px solid transparent;
            position: relative;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background-color: rgba(59,130,246,0.05);
        }

        .nav-tab.active {
            color: var(--color-accent);
            border-bottom-color: var(--color-accent);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1rem;
            scroll-behavior: smooth;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .briefing-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
            font-family: 'Newsreader', serif;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .ticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .ticker-card {
            padding: 1rem;
            border-radius: 12px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .ticker-card:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--color-accent);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .ticker-card.mover-up {
            border-color: var(--color-up);
            background-color: rgba(34,197,94,0.05);
        }

        .ticker-card.mover-down {
            border-color: var(--color-down);
            background-color: rgba(239,68,68,0.05);
        }

        .ticker-symbol {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .ticker-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ticker-price {
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
        }

        .ticker-change {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .ticker-change.up {
            color: var(--color-up);
        }

        .ticker-change.down {
            color: var(--color-down);
        }

        .alert-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background-color: var(--color-warning);
            color: #000;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .what-to-watch {
            padding: 1.5rem;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1));
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .what-to-watch-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
            font-family: 'Newsreader', serif;
        }

        .watch-item {
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            border-left: 3px solid var(--color-accent);
            padding-left: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .watch-item strong {
            color: var(--text-primary);
        }

        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 100;
            animation: fadeIn 150ms ease-out;
        }

        .detail-overlay.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .detail-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            z-index: 101;
            transform: translateX(100%);
            transition: transform 250ms cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .detail-overlay.active .detail-panel {
            transform: translateX(0);
        }

        .detail-header {
            padding: 1.5rem;
            background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-shrink: 0;
        }

        .detail-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--transition);
        }

        .detail-close:hover {
            color: var(--text-primary);
        }

        .detail-hero {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .detail-symbol {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-name {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .detail-price {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .detail-change {
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-change.up {
            color: var(--color-up);
        }

        .detail-change.down {
            color: var(--color-down);
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .detail-content::-webkit-scrollbar {
            width: 4px;
        }

        .detail-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            padding: 1rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .thesis-box {
            padding: 1.25rem;
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(59,130,246,0.05));
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--color-accent);
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .analysis-box {
            padding: 1.25rem;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .analysis-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .signal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .analysis-signal {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .analysis-timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .analysis-commentary {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .consensus-bar {
            display: flex;
            height: 24px;
            border-radius: 6px;
            overflow: hidden;
            gap: 1px;
            background-color: var(--bg-secondary);
            margin-top: 1rem;
        }

        .consensus-segment {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .consensus-strong-buy {
            background-color: var(--color-up);
        }

        .consensus-buy {
            background-color: #4ade80;
        }

        .consensus-hold {
            background-color: var(--text-muted);
        }

        .consensus-sell {
            background-color: #fca5a5;
        }

        .consensus-strong-sell {
            background-color: var(--color-down);
        }

        .news-section {
            margin-top: 2rem;
        }

        .news-item {
            padding: 1rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .news-headline {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            font-family: 'Newsreader', serif;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .news-source {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .news-tag {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .news-tag.geo {
            background-color: rgba(220,38,38,0.2);
            color: #fca5a5;
        }

        .news-tag.ai {
            background-color: rgba(59,130,246,0.2);
            color: #93c5fd;
        }

        .news-tag.energy {
            background-color: rgba(251,191,36,0.2);
            color: #fcd34d;
        }

        .news-tag.crypto {
            background-color: rgba(249,115,22,0.2);
            color: #fed7aa;
        }

        .news-tag.fed {
            background-color: rgba(139,92,246,0.2);
            color: #d8b4fe;
        }

        .news-tag.earnings {
            background-color: rgba(34,197,94,0.2);
            color: #86efac;
        }

        .settings-section {
            max-width: 500px;
        }

        .settings-item {
            margin-bottom: 2rem;
        }

        .settings-label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .settings-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .settings-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .settings-description {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .settings-button {
            padding: 0.75rem 1.5rem;
            background-color: var(--color-accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
            margin-top: 0.5rem;
        }

        .settings-button:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        .settings-version {
            padding: 1.5rem;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
            margin-top: 2rem;
        }

        .version-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.5rem;
        }

        .version-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-accent);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 600ms linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            padding: 1rem;
            background-color: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .ticker-grid-full {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.25rem;
        }

        @media (max-width: 600px) {
            .detail-panel {
                max-width: 100%;
            }

            .pulse-strip {
                gap: 0.75rem;
            }

            .pulse-item {
                padding: 0.4rem 0.8rem;
                font-size: 0.85rem;
            }

            .ticker-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.75rem;
            }

            .ticker-grid-full {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-title">Einstein Markets</div>
                <div class="header-time" id="headerTime">--:--:-- UTC</div>
            </div>
            <div class="pulse-strip" id="pulseStrip"></div>
            <div class="market-mood" id="marketMood">Loading market sentiment...</div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="briefing">Briefing</button>
            <button class="nav-tab" data-tab="tickers">Tickers</button>
            <button class="nav-tab" data-tab="settings">Settings</button>
        </div>

        <div class="content" id="content">
            <!-- Tab content goes here -->
        </div>
    </div>

    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <div class="detail-hero">
                    <div class="detail-symbol" id="detailSymbol">--</div>
                    <div class="detail-name" id="detailName">--</div>
                    <div class="detail-price" id="detailPrice">--</div>
                    <div class="detail-change" id="detailChange">--</div>
                </div>
                <button class="detail-close" id="detailClose">&times;</button>
            </div>
            <div class="detail-content" id="detailContent">
                <!-- Detail content goes here -->
            </div>
        </div>
    </div>

    <script>
        const API_KEY_STORAGE_KEY = 'fh_key';
        const BRIEFING_URL = './data/briefing.json';
        const VERSION = 'v2.0';

        // State
        const state = {
            currentTab: 'briefing',
            apiKey: localStorage.getItem(API_KEY_STORAGE_KEY) || '',
            tickers: {},
            briefingData: {},
            selectedTicker: null,
        };

        const watchlist = {
            core5: [
                { symbol: 'NVDA', name: 'Nvidia' },
                { symbol: 'MU', name: 'Micron' },
                { symbol: 'DELL', name: 'Dell' },
                { symbol: 'AMD', name: 'AMD' },
                { symbol: 'TSM', name: 'TSMC' },
            ],
            radar: [
                { symbol: 'AVGO', name: 'Broadcom' },
                { symbol: 'VRT', name: 'Vertiv' },
                { symbol: 'MRVL', name: 'Marvell' },
                { symbol: 'ANET', name: 'Arista' },
                { symbol: 'CLS', name: 'Celestica' },
            ],
            energy: [
                { symbol: 'XOM', name: 'Exxon Mobil' },
                { symbol: 'CVX', name: 'Chevron' },
            ],
            crypto: [
                { symbol: 'BTC', name: 'Bitcoin' },
                { symbol: 'ETH', name: 'Ethereum' },
            ],
            market: [
                { symbol: 'SPY', name: 'S&P 500' },
                { symbol: 'QQQ', name: 'NASDAQ' },
                { symbol: 'UVXY', name: 'VIX' },
            ],
        };

        const investmentTheses = {
            NVDA: "The undisputed king of AI GPUs. $500B+ in Blackwell/Rubin revenue pipeline visibility through end of 2026. Data center revenue up 75% YoY. Vera Rubin chip (10x perf/watt) ships H2 2026. Morningstar fair value $240. Risk: zero China revenue in guidance, architecture transitions can compress margins.",
            MU: "One of only three companies in the world making HBM (high-bandwidth memory) — every AI GPU needs it. Entire 2026 HBM output sold out. Forward P/E of ~7x with 300% EPS growth. HBM TAM forecast to hit $100B by 2028, two years earlier than expected. Arguably the most undervalued AI play.",
            DELL: "$43B AI server backlog, $64B total AI orders for the year. AI server revenue exploded 342% to $9B in Q4. Raised long-term revenue growth to 7-9% annually. Risk: margin pressure from rising DRAM/NAND costs and China supply chain restructuring.",
            AMD: "The inference play. MI355X delivers 30% faster inference than Nvidia B200 on Llama 3.1 with ~40% better tokens-per-dollar. OpenAI taking up to 10% stake and committing up to 6GW of AMD GPUs (~$200B+). Meta also on board. 4% data center GPU market share, up from 2%.",
            TSM: "Controls ~70% of global semiconductor foundry market. Every chip from Nvidia, AMD, Apple, Qualcomm runs through their fabs. AI chip revenue growing at 60% CAGR through 2029. 63-65% gross margins. Discount is entirely Taiwan geopolitical risk — mitigating via Japan and Arizona expansion.",
            AVGO: "Designs custom AI ASICs for Google, Meta, and others. Jericho3-AI switch platform becoming standard in AI clusters. A less volatile way to play the custom silicon trend.",
            VRT: "Power and cooling for AI data centers. The boring-but-essential play. Co-engineers cooling for Nvidia superclusters. As Blackwell and Rubin push power density higher, liquid cooling becomes mandatory — Vertiv's high-density units command better margins.",
            MRVL: "Custom silicon for AWS and Microsoft hitting volume production on 3nm. Management guides custom ASIC revenue to double within two years. Pure play on the 'hyperscalers building their own chips' trend.",
            ANET: "The networking backbone of AI data centers. 42.7% EBITDA margin, consistent earnings beats. As AI clusters scale, the networking fabric between GPUs becomes the bottleneck — that's Arista's sweet spot.",
            CLS: "AI hardware manufacturing. 223% one-year return with 65% projected EPS growth. Less well-known but deeply embedded in the AI supply chain.",
            XOM: "Oil supermajor with upstream exposure. Benefits directly from geopolitical energy disruptions. Diversified portfolio across exploration, production, refining.",
            CVX: "Geopolitical energy play and Berkshire Hathaway holding. Buffett added 8M+ shares recently. Declared force majeure at Leviathan gas field (Israel). Secured exclusive rights on Iraq's West Qurna 2 oilfield (450K bpd). Up 27% YTD.",
            BTC: "Digital gold thesis gaining traction — showed real decoupling during March 2026 crisis (rose 3.7% while S&P hit lows). Institutional adoption accelerating through ETFs. Macro hedge against inflation and currency debasement.",
            ETH: "The smart contract and DeFi ecosystem backbone. Benefits from institutional crypto adoption and growing L2 scaling solutions. Staking yield provides passive return floor.",
        };

        // Utility Functions
        function formatTime() {
            const now = new Date();
            return now.toUTCString().substring(0, 12);
        }

        function formatPrice(price) {
            if (typeof price !== 'number') return '--';
            return '$' + price.toFixed(2);
        }

        function formatPercent(pct) {
            if (typeof pct !== 'number') return '--';
            const sign = pct >= 0 ? '+' : '';
            return sign + pct.toFixed(2) + '%';
        }

        function isBigMover(change) {
            return Math.abs(change) >= 3;
        }

        // API Functions
        async function fetchTickerData(symbol) {
            if (!state.apiKey) {
                return null;
            }
            try {
                const response = await fetch(
                    `https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${state.apiKey}`
                );
                const data = await response.json();
                if (data.c !== undefined) {
                    return {
                        symbol,
                        price: data.c,
                        change: data.d || 0,
                        changePercent: data.dp || 0,
                        open: data.o || 0,
                        high: data.h || 0,
                        low: data.l || 0,
                        prevClose: data.pc || 0,
                    };
                }
            } catch (e) {
                console.error(`Error fetching ${symbol}:`, e);
            }
            return null;
        }

        async function fetchCompanyNews(symbol) {
            if (!state.apiKey) return [];
            try {
                const to = new Date().toISOString().split('T')[0];
                const from = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                const response = await fetch(
                    `https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=${from}&to=${to}&token=${state.apiKey}`
                );
                const news = await response.json();
                return (news || []).slice(0, 5).map(item => ({
                    headline: item.headline,
                    source: item.source,
                    url: item.url,
                    datetime: item.datetime,
                }));
            } catch (e) {
                console.error(`Error fetching news for ${symbol}:`, e);
                return [];
            }
        }

        async function loadBriefingData() {
            try {
                const response = await fetch(BRIEFING_URL);
                const data = await response.json();
                state.briefingData = data;
                return data;
            } catch (e) {
                console.warn('No briefing data available:', e);
                return {};
            }
        }

        async function loadAllTickerData() {
            const allSymbols = [
                ...watchlist.core5,
                ...watchlist.radar,
                ...watchlist.energy,
                ...watchlist.crypto,
                ...watchlist.market,
            ];

            // Special handling for crypto and commodities
            const specialSymbols = ['BTC', 'ETH', 'OANDA:XAU_USD', 'OANDA:BCO_USD'];
            const finnhubSymbols = allSymbols.filter(item => !specialSymbols.includes(item.symbol));

            // Fetch Finnhub data
            for (const item of finnhubSymbols) {
                const data = await fetchTickerData(item.symbol);
                if (data) {
                    state.tickers[item.symbol] = { ...data, name: item.name };
                }
            }

            // Fetch crypto data from CoinGecko
            try {
                const cryptoResponse = await fetch(
                    'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true'
                );
                const cryptoData = await cryptoResponse.json();
                if (cryptoData.bitcoin) {
                    state.tickers['BTC'] = {
                        symbol: 'BTC',
                        name: 'Bitcoin',
                        price: cryptoData.bitcoin.usd,
                        changePercent: cryptoData.bitcoin.usd_24h_change,
                        change: 0,
                        open: 0,
                        high: 0,
                        low: 0,
                        prevClose: 0,
                    };
                }
                if (cryptoData.ethereum) {
                    state.tickers['ETH'] = {
                        symbol: 'ETH',
                        name: 'Ethereum',
                        price: cryptoData.ethereum.usd,
                        changePercent: cryptoData.ethereum.usd_24h_change,
                        change: 0,
                        open: 0,
                        high: 0,
                        low: 0,
                        prevClose: 0,
                    };
                }
            } catch (e) {
                console.error('Error fetching crypto data:', e);
            }

            // Fetch commodities via Finnhub
            for (const symbol of ['OANDA:XAU_USD', 'OANDA:BCO_USD']) {
                const data = await fetchTickerData(symbol);
                if (data) {
                    const name = symbol === 'OANDA:XAU_USD' ? 'Gold' : 'Oil';
                    state.tickers[symbol] = { ...data, name };
                }
            }
        }

        // UI Rendering Functions
        function renderHeader() {
            document.getElementById('headerTime').textContent = formatTime();
            setInterval(() => {
                document.getElementById('headerTime').textContent = formatTime();
            }, 1000);
        }

        function renderPulseStrip() {
            const pulseSymbols = [
                { symbol: 'SPY', name: 'S&P 500' },
                { symbol: 'QQQ', name: 'NASDAQ' },
                { symbol: 'UVXY', name: 'VIX' },
                { symbol: 'BTC', name: 'Bitcoin' },
                { symbol: 'OANDA:XAU_USD', name: 'Gold' },
                { symbol: 'OANDA:BCO_USD', name: 'Oil' },
            ];

            const pulseStrip = document.getElementById('pulseStrip');
            pulseStrip.innerHTML = pulseSymbols.map(item => {
                const ticker = state.tickers[item.symbol];
                const price = ticker ? formatPrice(ticker.price) : '--';
                const changePercent = ticker ? ticker.changePercent : 0;
                const changeClass = changePercent >= 0 ? 'up' : 'down';
                const changeText = ticker ? formatPercent(changePercent) : '--';

                return `
                    <div class="pulse-item" onclick="openDetail('${item.symbol}')">
                        <div class="pulse-symbol">${item.symbol.replace('OANDA:', '')}</div>
                        <div class="pulse-price">${price}</div>
                        <div class="pulse-change ${changeClass}">${changeText}</div>
                    </div>
                `;
            }).join('');
        }

        function renderMarketMood() {
            const briefing = state.briefingData || {};
            const mood = briefing.marketMood || "Market sentiment loading...";
            document.getElementById('marketMood').innerHTML = `<div class="mood-text">${mood}</div>`;
        }

        function renderBriefing() {
            const briefing = state.briefingData || {};
            const sections = {
                'AI Infrastructure': {
                    tickers: [...watchlist.core5, ...watchlist.radar],
                    icon: '🤖',
                },
                'Energy & Commodities + Crypto': {
                    tickers: [...watchlist.energy, ...watchlist.crypto],
                    icon: '⚡',
                },
            };

            let html = '';

            // "What to Watch" Box
            const vixPrice = state.tickers['UVXY']?.price || 0;
            const oilPrice = state.tickers['OANDA:BCO_USD']?.price || 0;
            const movers = Object.values(state.tickers).filter(t => isBigMover(t.changePercent)).slice(0, 3);

            html += `
                <div class="what-to-watch">
                    <div class="what-to-watch-title">📊 What to Watch</div>
            `;

            if (vixPrice > 25) {
                html += `<div class="watch-item"><strong>VIX elevated at ${vixPrice.toFixed(1)}:</strong> Volatility spike suggests market repricing. Watch tech earnings calendar and Fed speakers.</div>`;
            }
            if (oilPrice > 80) {
                html += `<div class="watch-item"><strong>Oil at ${formatPrice(oilPrice)}:</strong> Geopolitical premium embedded. Energy sector leadership may reverse if tensions ease.</div>`;
            }
            if (movers.length > 0) {
                const moverText = movers.map(t => `${t.symbol} ${formatPercent(t.changePercent)}`).join(', ');
                html += `<div class="watch-item"><strong>Big movers:</strong> ${moverText}. Check if sentiment-driven or fundamental.</div>`;
            }

            html += `</div>`;

            // Briefing Sections
            for (const [sectionName, sectionConfig] of Object.entries(sections)) {
                html += `<div class="briefing-section">`;
                html += `<div class="section-title">${sectionConfig.icon} ${sectionName}</div>`;
                html += `<div class="ticker-grid">`;

                for (const item of sectionConfig.tickers) {
                    const ticker = state.tickers[item.symbol];
                    if (!ticker) continue;

                    const changeClass = ticker.changePercent >= 0 ? 'up' : 'down';
                    const isMover = isBigMover(ticker.changePercent);
                    const moverClass = isMover ? (ticker.changePercent >= 0 ? 'mover-up' : 'mover-down') : '';
                    const alert = isMover ? '<div class="alert-badge">3%+ MOVE</div>' : '';

                    html += `
                        <div class="ticker-card ${moverClass}" onclick="openDetail('${item.symbol}')">
                            <div class="ticker-symbol">${item.symbol}</div>
                            <div class="ticker-name">${item.name}</div>
                            <div class="ticker-price">${formatPrice(ticker.price)}</div>
                            <div class="ticker-change ${changeClass}">
                                ${formatPercent(ticker.changePercent)} ${alert}
                            </div>
                        </div>
                    `;
                }

                html += `</div></div>`;
            }

            document.getElementById('content').innerHTML = html;
        }

        function renderTickers() {
            const allTickers = Object.values(state.tickers);
            let html = '<div class="ticker-grid-full">';

            for (const ticker of allTickers) {
                const changeClass = ticker.changePercent >= 0 ? 'up' : 'down';
                const isMover = isBigMover(ticker.changePercent);
                const moverClass = isMover ? (ticker.changePercent >= 0 ? 'mover-up' : 'mover-down') : '';
                const alert = isMover ? '<div class="alert-badge">3%+ MOVE</div>' : '';

                html += `
                    <div class="ticker-card ${moverClass}" onclick="openDetail('${ticker.symbol}')">
                        <div class="ticker-symbol">${ticker.symbol}</div>
                        <div class="ticker-name">${ticker.name}</div>
                        <div class="ticker-price">${formatPrice(ticker.price)}</div>
                        <div class="ticker-change ${changeClass}">
                            ${formatPercent(ticker.changePercent)} ${alert}
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        function renderSettings() {
            const apiKey = state.apiKey;
            const masked = apiKey ? apiKey.substring(0, 8) + '***' : '';

            let html = `
                <div class="settings-section">
                    <div class="settings-item">
                        <label class="settings-label">Finnhub API Key</label>
                        <input type="password" id="apiKeyInput" class="settings-input" value="${apiKey}" placeholder="Enter your Finnhub API key">
                        <div class="settings-description">Get a free key at finnhub.io. Used for real-time stock quotes.</div>
                        <button class="settings-button" onclick="saveApiKey()">Save API Key</button>
                    </div>

                    <div class="settings-version">
                        <div class="version-text">Einstein Markets</div>
                        <div class="version-number">${VERSION}</div>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        function renderTab(tabName) {
            state.currentTab = tabName;

            // Update nav tabs
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.tab === tabName);
            });

            // Render content
            if (tabName === 'briefing') {
                renderBriefing();
            } else if (tabName === 'tickers') {
                renderTickers();
            } else if (tabName === 'settings') {
                renderSettings();
            }
        }

        async function openDetail(symbol) {
            state.selectedTicker = symbol;
            const ticker = state.tickers[symbol];

            if (!ticker) {
                console.warn(`Ticker ${symbol} not found`);
                return;
            }

            let detailHtml = '';

            // Stats Grid
            detailHtml += `
                <div class="detail-section">
                    <div class="detail-section-title">Market Data</div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">Open</div>
                            <div class="stat-value">${formatPrice(ticker.open)}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">High</div>
                            <div class="stat-value">${formatPrice(ticker.high)}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Low</div>
                            <div class="stat-value">${formatPrice(ticker.low)}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Prev Close</div>
                            <div class="stat-value">${formatPrice(ticker.prevClose)}</div>
                        </div>
                    </div>
                </div>
            `;

            // Investment Thesis
            if (investmentTheses[symbol]) {
                detailHtml += `
                    <div class="detail-section">
                        <div class="detail-section-title">Investment Thesis</div>
                        <div class="thesis-box">${investmentTheses[symbol]}</div>
                    </div>
                `;
            }

            // AI Analysis Box
            const briefing = state.briefingData[symbol] || {};
            if (briefing.signal) {
                const signalColor = {
                    'strong_buy': 'var(--color-up)',
                    'buy': '#4ade80',
                    'neutral': 'var(--text-muted)',
                    'caution': 'var(--color-warning)',
                    'bearish': 'var(--color-down)',
                }[briefing.signal] || 'var(--text-muted)';

                detailHtml += `
                    <div class="detail-section">
                        <div class="detail-section-title">AI Analysis</div>
                        <div class="analysis-box">
                            <div class="analysis-header">
                                <div class="signal-dot" style="background-color: ${signalColor};"></div>
                                <div>
                                    <div class="analysis-signal">${briefing.signalLabel || 'Analyzing...'}</div>
                                    <div class="analysis-timestamp">${briefing.timestamp || 'N/A'}</div>
                                </div>
                            </div>
                            <div class="analysis-commentary">${briefing.commentary || 'Analysis loading...'}</div>
                            ${briefing.consensus ? `
                                <div>Analyst Consensus:</div>
                                <div class="consensus-bar">
                                    ${[
                                        { class: 'consensus-strong-buy', label: 'SB', value: briefing.consensus.strongBuy || 0 },
                                        { class: 'consensus-buy', label: 'B', value: briefing.consensus.buy || 0 },
                                        { class: 'consensus-hold', label: 'H', value: briefing.consensus.hold || 0 },
                                        { class: 'consensus-sell', label: 'S', value: briefing.consensus.sell || 0 },
                                        { class: 'consensus-strong-sell', label: 'SS', value: briefing.consensus.strongSell || 0 },
                                    ].map(seg => `<div class="consensus-segment ${seg.class}" style="flex: ${seg.value || 1};">${seg.label}</div>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }

            // News Section
            detailHtml += `<div class="detail-section news-section">`;
            detailHtml += `<div class="detail-section-title">Latest News</div>`;

            const news = await fetchCompanyNews(symbol);
            if (news.length > 0) {
                detailHtml += news.map(item => {
                    const date = new Date(item.datetime * 1000).toLocaleDateString();
                    return `
                        <div class="news-item">
                            <div class="news-headline">${item.headline}</div>
                            <div class="news-meta">
                                <span class="news-source">${item.source}</span>
                                <span>${date}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                detailHtml += '<div style="color: var(--text-muted); font-size: 0.9rem;">No recent news available.</div>';
            }

            detailHtml += `</div>`;

            // Populate detail view
            document.getElementById('detailContent').innerHTML = detailHtml;
            document.getElementById('detailSymbol').textContent = ticker.symbol;
            document.getElementById('detailName').textContent = ticker.name || '';
            document.getElementById('detailPrice').textContent = formatPrice(ticker.price);

            const changeClass = ticker.changePercent >= 0 ? 'up' : 'down';
            document.getElementById('detailChange').innerHTML = `
                <span class="${changeClass}">${formatPercent(ticker.changePercent)}</span>
            `;

            // Show overlay
            document.getElementById('detailOverlay').classList.add('active');
            history.pushState({ detail: symbol }, '', `#${symbol}`);
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('active');
            state.selectedTicker = null;
            history.pushState({}, '', window.location.pathname);
        }

        function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (apiKey) {
                localStorage.setItem(API_KEY_STORAGE_KEY, apiKey);
                state.apiKey = apiKey;
                alert('API key saved! Refresh the page to load live data.');
            } else {
                alert('Please enter a valid API key.');
            }
        }

        // Event Listeners
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                renderTab(tab.dataset.tab);
            });
        });

        document.getElementById('detailClose').addEventListener('click', closeDetail);
        document.getElementById('detailOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'detailOverlay') {
                closeDetail();
            }
        });

        window.addEventListener('popstate', () => {
            closeDetail();
        });

        // Initialize
        async function init() {
            renderHeader();
            await loadBriefingData();
            await loadAllTickerData();
            renderPulseStrip();
            renderMarketMood();
            renderTab('briefing');

            // Refresh data every 5 minutes
            setInterval(async () => {
                await loadAllTickerData();
                renderPulseStrip();
                if (state.currentTab === 'briefing') {
                    renderBriefing();
                } else if (state.currentTab === 'tickers') {
                    renderTickers();
                }
            }, 5 * 60 * 1000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(e => {
                console.log('SW registration failed:', e);
            });
        }
    </script>
</body>
</html>
